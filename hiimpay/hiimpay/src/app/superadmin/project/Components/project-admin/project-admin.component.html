<div class="container manage-users-page">
  <div class="row mt-2 px-4">
    <div class="col-lg col-md col-sm-12">
      <div class="page-head">
        <div>
          <h3 class="page-title">Manage users</h3>
        </div>

        <span class="blue-color font-weight-bold company-name company-pill" [title]="companyName">Company name : {{ companyName }}</span>
      </div>
    </div>
  </div>
</div>

<div class="container manage-users-page">
  <div class="row px-4 py-4">
    <div class="col-lg-12 col-md col-sm-12">
        <div class="row mb-2">
          <div class="toolbar-wrap">
            <div class="toolbar-spacer" aria-hidden="true"></div>

            <div class="top-actions" role="group" aria-label="Manage users actions">
              <div class="secondary-actions">
                <button
                  class="action-btn secondary-btn"
                  type="button"
                  [disabled]="checkuploadExcelSpinner"
                  (click)="holidayFile.click()"
                  title="Import users from Excel"
                >
                  <span *ngIf="checkuploadExcelSpinner" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                  <i class="fa fa-file-excel-o" aria-hidden="true"></i>
                  <span>Import users from excel</span>
                </button>

                <input type="file" #holidayFile (change)="onFileBrowse($event)" class="hidden-input" accept=".xls,.xlsx">

                <button
                  class="action-btn secondary-btn"
                  type="button"
                  [disabled]="checkUpdateBulkSpinner"
                  (click)="bulkUpdateFile.click()"
                  title="Update users in bulk from Excel"
                >
                  <span *ngIf="checkUpdateBulkSpinner" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                  <i class="fa fa-refresh" aria-hidden="true"></i>
                  <span>Update bulk users (Excel)</span>
                </button>

                <input id="bulkUpdateFile" type="file" #bulkUpdateFile (change)="onBulkUpdateFileBrowse($event)" class="hidden-input" accept=".xls,.xlsx" />

                <button
                  class="action-btn secondary-btn"
                  type="button"
                  [disabled]="checkDownloadExcelSpinner"
                  (click)="downloadExcelFormat()"
                  title="Download the bulk upload template"
                >
                  <span *ngIf="checkDownloadExcelSpinner" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                  <i class="fa fa-download" aria-hidden="true"></i>
                  <span>Bulk user upload template</span>
                </button>
              </div>

              <button class="action-btn primary-btn" type="button" (click)="openPopup()" title="Create user">
                <img src="assets/plus.svg" class="me-2" height="18" alt="" />
                <span class="filter-text">Create user</span>
              </button>
            </div>
          </div>
        </div>

        <section *ngIf="!isLoading" class="mt-3">
          <div class="row table-row row-head gx-0">
            <div class="col">Name</div>
            <div class="col">Email</div>
            <div class="col">Status</div>
            <div class="col">Contact</div>
            <div class="col">Role</div>
            <div class="col">Action</div>
          </div>
          <div class="tableCointainer" style="height: 100%; padding-bottom: 5%;" *ngIf="(details?.length ?? 0) > 0">
            <div class="row gx-0 table-row row-body px-0"
              *ngFor="let data of details | paginate: { itemsPerPage: itemPerPage, currentPage: page, totalItems: totalItems }">
              <div class="col d-flex align-items-center">
                <div class="col ms-1">
                  <p class="fw-bold mb-1 truncate" [title]="data.fullName">{{ data.fullName }}</p>
                </div>
              </div>
              <div class="col">
                <p class="fw-normal mb-1 truncate" [title]="data.email">{{data.email}}</p>
              </div>
              <div class="col">
                <span *ngIf="data.status=='ACTIVE'" class="status-badge status-active">
                  <span class="status-dot" aria-hidden="true"></span>
                  Active
                </span>
                <span *ngIf="data.status!='ACTIVE'" class="status-badge status-inactive">
                  <span class="status-dot" aria-hidden="true"></span>
                  Inactive
                </span>
              </div>

              <div class="col">
                <p class="text-muted mb-0 truncate" [title]="data.mobile">{{data.mobile}}</p>
              </div>
              <div class="col">
                <p>
                  <span class="truncate" [title]="data?.userType || '-'">{{data?.userType || '-'}}</span>
                </p>
              </div>
              <div class="col">
                <div class="action-group">
                  <button class="icon-action-btn" type="button" (click)="editUser(data.id)" title="Edit user" aria-label="Edit user">
                    <i class="fa fa-pencil" aria-hidden="true"></i>
                  </button>
                  <span class="toggle-wrap" title="Activate / Deactivate User">
                    <mat-slide-toggle class="green-toggle" [checked]="data?.status=='ACTIVE'" (change)="activeDeactiveUser(data)" aria-label="Activate or deactivate user"></mat-slide-toggle>
                  </span>
                  <!-- <button class="border-0 m-2" style="font-size: 20px" (click)="deleteUser(data)">
                    <i class="fa fa-trash" style="color: #103a7f"></i>
                  </button> -->
                </div>
              </div>
            </div>
            <div class="text-end my-4 pagination-wrap">
              <pagination-controls (pageChange)="pageChangeEvent($event)" [maxSize]="5"></pagination-controls>
            </div>
          </div>
          <div class="tableContainer" *ngIf="details.length == 0">
            <span class="unavailability">No data found</span>
          </div>
        </section>
        <div class="text-center my-5">
          <i *ngIf="isLoading" class="fa fa-spinner fa-spin" style="font-size:64px;color: #103a7f;"></i>
        </div>

        <!-- <button  disabled class="btn btn-primary w-100">Please Wait. . .</button> -->
    </div>
