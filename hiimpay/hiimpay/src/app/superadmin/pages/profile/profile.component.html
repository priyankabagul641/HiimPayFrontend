<section class="h-100 d-flex justify-content-center mainSection">
  <div class="container mt-5 d-flex justify-content-center">
    <div class="row justify-content-center w-100">
      <div class="col-lg-8 col-md-10 col-sm-12">

        <!-- Back Button -->
        <button class="btn rounded-circle mb-3 text-white"
                style="background-color:#103a7f"
                (click)="goBack()">
          <i class="fas fa-arrow-left"></i>
        </button>

        <!-- Profile Card -->
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div class="d-flex align-items-center">
              <div class="me-4 text-center">
                <div class="avatar">{{ getInitials() }}</div>
                <div class="mt-2 text-muted small">ID: {{ profileInfo?.id }}</div>
              </div>
              <div class="flex-fill">
                <h3 class="mb-1">{{ profileInfo?.fullName || profileInfo?.name }}</h3>
                <div class="text-muted mb-2">{{ profileInfo?.email }}</div>

                <div class="row mb-2 info-row">
                  <div class="col-sm-4 fw-bold">Mobile</div>
                  <div class="col-sm-8">{{ profileInfo?.mobile || '-' }}</div>
                </div>

                <div class="row mb-2 info-row">
                  <div class="col-sm-4 fw-bold">Role</div>
                  <div class="col-sm-8">{{ profileInfo?.userType || '-' }}</div>
                </div>

                <div class="row mb-3 info-row">
                  <div class="col-sm-4 fw-bold">Status</div>
                  <div class="col-sm-8">
                    <span class="badge" [ngClass]="{'bg-success': profileInfo?.status==='ACTIVE', 'bg-danger': profileInfo?.status!=='ACTIVE'}">
                      {{ profileInfo?.status === 'ACTIVE' ? 'Active' : 'Inactive' }}
                    </span>
                  </div>
                </div>

                <div class="d-flex justify-content-end gap-3">
                  <button class="btn btn-outline-primary btn-sm" (click)="onEdit()"><i class="fas fa-edit me-1"></i> Edit</button>
                  <button class="btn btn-outline-secondary btn-sm" (click)="onManageAccess()"><i class="fas fa-user-shield me-1"></i> Access</button>
                  <button class="btn btn-outline-danger btn-sm" (click)="onDelete()"><i class="fas fa-trash me-1"></i> Delete</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
