<section>
  <div class="card">
    <div class="card-body">
      <div class="enclosingDiv">

        <h2>Update Profile</h2>

        <form [formGroup]="updateRecordsForm">

          <div class="row">

            <!-- Name -->
            <div class="col-md-6 mt-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-file-person-fill"></i>
                </span>
                <input
                  type="text"
                  class="form-control"
                  formControlName="name"
                  placeholder="Enter name">
              </div>
              <small
                class="text-danger d-block text-end"
                *ngIf="updateRecordsForm.get('name')?.touched &&
                  updateRecordsForm.get('name')?.value?.trim() === ''">
                Name cannot be empty
              </small>
            </div>

            <!-- Contact Number -->
            <div class="col-md-6 mt-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-telephone-fill"></i>
                </span>
                <input
                  type="text"
                  class="form-control"
                  formControlName="mobile"
                  placeholder="Enter contact number">
              </div>
              <small
                class="text-danger d-block text-end"
                *ngIf="updateRecordsForm.get('mobile')?.touched &&
                  updateRecordsForm.get('mobile')?.hasError('pattern')">
                Enter a valid 10-digit contact number
              </small>
            </div>

            <!-- Email -->
            <div class="col-md-6 mt-3">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-envelope-at-fill"></i>
                </span>
                <input
                  type="email"
                  class="form-control"
                  formControlName="email"
                  placeholder="Enter email id">
              </div>
              <small
                class="text-danger d-block text-end"
                *ngIf="updateRecordsForm.get('email')?.touched &&
                  updateRecordsForm.get('email')?.hasError('pattern')">
                Enter a valid email address
              </small>
            </div>

            <!-- Password (optional) -->
            <div class="col-md-6 mt-3" *ngIf="!disablePasswordEdit">
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-key-fill"></i>
                </span>
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  formControlName="passwordHash"
                  placeholder="Enter new password (optional)">
                <button type="button" class="btn btn-outline-secondary" (click)="showPassword = !showPassword" style="margin-left:8px">
                  <i class="fa" [ngClass]="{'fa-eye': showPassword, 'fa-eye-slash': !showPassword}"></i>
                </button>
              </div>
              <small class="text-muted d-block text-end">Leave blank to keep existing password</small>
            </div>

          </div>

          <!-- Buttons -->
          <mat-dialog-actions class="mt-4 d-flex justify-content-end">
            <button mat-button type="button" (click)="onNoClick()">
              No thanks
            </button>

            <button
              mat-button
              type="button"
              class="updateButton"
              (click)="onSubmit()"
              [disabled]="formDataMatched || updateRecordsForm.invalid || isLoading"
              [ngStyle]="{
                opacity: (formDataMatched || updateRecordsForm.invalid || isLoading) ? '0.5' : '1'
              }">
              <span *ngIf="!isLoading">Update</span>
              <span *ngIf="isLoading">Updating...</span>
            </button>
          </mat-dialog-actions>

        </form>

      </div>
    </div>
  </div>
</section>
