<main class="browse-main">
  <div class="browse-header">
    <h1>E-Gift Cards & Coupons</h1>
    <p>Get amazing discounts on your favorite brands</p>
  </div>

  <div class="browse-loading" *ngIf="shell.browseCouponsLoading">
    <span class="loader-dot"></span>
    <span class="loader-dot"></span>
    <span class="loader-dot"></span>
  </div>

  <div class="coupon-grid" *ngIf="!shell.browseCouponsLoading">
    <article
      class="coupon-card"
      *ngFor="let coupon of coupons; let i = index; trackBy: trackById"
      [style.--i]="i"
      (click)="openCouponDetails(coupon.id)"
    >
      <div class="coupon-image-wrap">
        <ng-container *ngIf="hasCouponImage(coupon); else browseNoImageState">
          <img
            [src]="coupon.image"
            [alt]="coupon.brandName"
            class="coupon-image"
            (error)="onCouponImageError(coupon)"
          />
        </ng-container>
        <ng-template #browseNoImageState>
          <div class="coupon-image-fallback" aria-label="No image available">
            <mat-icon>image_not_supported</mat-icon>
            <span>No Image</span>
          </div>
        </ng-template>
      </div>

      <div class="coupon-content">
        <h3>{{ coupon.title || (coupon.brandName + ' E-Gift Card') }}</h3>
        <p class="coupon-brand">{{ coupon.brandName }}</p>

        <div class="coupon-footer">
          <div class="discount-wrap">
            <span class="discount-value">{{ coupon.discount }}</span>
            <span class="discount-label">Discount</span>
          </div>
          <div class="coupon-actions">
            <!-- <button class="add-cart-btn" (click)="addtoCartItems(coupon, $event)">
              Add to Cart
            </button> -->
            <button class="buy-now-btn" (click)="$event.stopPropagation(); openCouponDetails(coupon.id)">
              <span>Buy Now</span>
              <span class="btn-arrow">›</span>
            </button>
          </div>
        </div>
      </div>
    </article>
  </div>
</main>
